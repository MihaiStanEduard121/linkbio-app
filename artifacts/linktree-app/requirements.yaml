packages:
  "framer-motion": "For smooth layout transitions, page reveals, and animated link buttons"
  "recharts": "For rendering beautiful analytics line charts and bar charts"
  "@dnd-kit/core": "For accessible drag-and-drop link reordering"
  "@dnd-kit/sortable": "For list sorting strategies in dashboard"
  "@dnd-kit/utilities": "Helper utilities for dnd-kit"
  "@hookform/resolvers": "Zod validation resolver for React Hook Form"
  "react-hook-form": "Performant, flexible and extensible forms with easy-to-use validation"
  "zod": "TypeScript-first schema validation for forms"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "lucide-react": "Beautiful, consistent icon set"

images:
  - path: "artifacts/linktree-app/public/images/hero-bg.png"
    description: "Ultra-modern abstract dark background with vibrant neon purple, pink, and cyan gradient mesh glowing softly, creating a sense of digital space and premium tech product."
    aspect_ratio: "16:9"
  - path: "artifacts/linktree-app/public/images/default-avatar.png"
    description: "A trendy, vibrant abstract 3D shape (like a colorful sphere or fluid blob) floating on a dark background, perfect for a modern generic user avatar."
    aspect_ratio: "1:1"

notes:
  - API client hooks are imported from @workspace/api-client-react
  - Authentication requires sending the JWT token from localStorage in the Authorization header.
  - The appearance configuration is heavily driven by inline styles mapped from the user's DB settings.
