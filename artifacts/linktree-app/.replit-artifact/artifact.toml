kind = "web"
previewPath = "/"
title = "LinkBio - Linktree Clone"
version = "1.0.0"
id = "artifacts/linktree-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21877
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/linktree-app run dev"

[services.env]
PORT = "21877"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/linktree-app", "run", "build"]
publicDir = "artifacts/linktree-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
